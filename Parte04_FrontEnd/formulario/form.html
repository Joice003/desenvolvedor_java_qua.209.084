<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--link para voltar  -->
    <a href="index.html">Voltar</a>

    <h1>Formulário</h1>
    <!-- formulário -->
     <form action="" method="">
        <label for="nome>">Nome:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>
        <label for="idade">Idade:</label><br>
        <input type="number" id="idade" name="idade" min="0"><br><br>
        <label for="altura">Altura:</label><br>
        <input type="number" id="altura" name="altura" step="0.01"><br><br>
        <label for="data de nascimento">Data de Nascimento:</label><br>
        <input type="date" id="data de nascimento" name="data de nascimento"><br><br>
        <label for="genero">Gênero:</label><br>
        <input type="radio" id="genero" name="genero" value="masculino"><span>Masculino</span><br>
        <input type="radio" id="genero" name="genero" value="feminino"><span>Feminino</span><br>
        <input type="radio" id="genero" name="genero" value="outro"><span>Outro</span><br><br>
        <label for="escolaridade">Escolaridade:</label><br>
        <select id="escolaridade" name="escolaridade">
            <option value="fundamental">Ensino Fundamental</option>
            <option value="medio">Ensino Médio</option>
            <option value="superior">Formação Superior</option>
            <option value="pos">Pós-Graduação</option>
            <option value="mestrado">Mestrado</option>
            <option value="doutorado">Doutorado</option>
        </select><br><br>
        <label for="senha">Senha:</label><br>
        <input type="password" id="senha" name="senha"><br><br>
        <button type="submit">Cadastrar</button>
        <span>        </span>
        <button type="reset">Resetar Formulário</button><br><br>
     </form>
</body>
</html>
