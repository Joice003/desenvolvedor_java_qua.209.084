<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>YouCast Atividade</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
    }

    /* HEADER */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background: #222;
        color: white;
    }

    .logo {
        font-size: 24px;
        font-weight: bold;
    }

    .menu span {
        margin-left: 20px;
        cursor: pointer;
    }

    .menu span:last-child {
        color: #ff4fd8;
        font-weight: bold;
    }

    /* LAYOUT */
    .container {
        display: flex;
    }

    /* SIDEBAR */
    .sidebar {
        width: 220px;
        background: #fff;
        padding: 15px;
        border-right: 1px solid #ddd;
    }

    .sidebar h3 {
        font-size: 14px;
        margin-top: 20px;
        color: #666;
    }

    .sidebar p {
        font-size: 13px;
        margin: 5px 0;
        color: #333;
    }

    /* GRID */
    .content {
        flex: 1;
        padding: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
    }

    .card {
        background: #fff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }

    .card-info {
        padding: 10px;
        font-size: 14px;
    }

    .views {
        color: gray;
        font-size: 12px;
    }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">YouCast <span style="color:#ff4fd8;">NOW</span></div>
    <div class="menu">
        <span>Streaming</span>
        <span>Discover</span>
        <span>Cast Now</span>
    </div>
</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Trending Casters</h3>
        <p>@userviagem</p>
        <p>@userpaisagem</p>
        <p>@uservida</p>

        <h3>Hashtags</h3>
        <p>#paz</p>
        <p>#vibe</p>
        <p>#viver</p>

        <h3>Locations</h3>
        <p>Brasil</p>
        <p>Mundo</p>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="grid">

            <!-- CARD -->
            <div class="card">
                <img src="img/paisagem_mar.jpg">
                <div class="card-info">
                    <strong>@mar</strong><br>
                    <span class="views">👁 5356</span>
                </div>
            </div>

            <div class="card">
                <img src="img/paisagem_pedras.jpg">
                <div class="card-info">
                    <strong>@pedras</strong><br>
                    <span class="views">👁 567</span>
                </div>
            </div>

            <div class="card">
                <img src="img/paisagem_predios.jpg">
                <div class="card-info">
                    <strong>@cidadesilencio</strong><br>
                    <span class="views">👁 13456</span>
                </div>
            </div>

            <div class="card">
                <img src="img/paissagem_mar_farol.jpg">
                <div class="card-info">
                    <strong>@farol</strong><br>
                    <span class="views">👁 7847</span>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
